name: Build & Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Verify APK exists
        run: ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/6700-transfer-debug.apk

      - name: Delete old release
        run: gh release delete latest-build --cleanup-tag --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "6700 Transfer - Derniere build (debug)"
          body: "APK debug genere automatiquement."
          prerelease: true
          files: app/build/outputs/apk/debug/6700-transfer-debug.apk
