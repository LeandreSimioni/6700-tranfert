name: Build & Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Verify APK exists
        run: ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/6700-transfer-debug.apk

      - name: Delete old release
        run: gh release delete latest-build --cleanup-tag --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          APK_PATH="app/build/outputs/apk/debug/6700-transfer-debug.apk"
          REPO="${{ github.repository }}"

          echo "Creating release..."
          RELEASE_JSON=$(curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases" \
            -d '{"tag_name":"latest-build","name":"6700 Transfer - Derniere build (debug)","body":"APK debug genere automatiquement.","prerelease":true,"draft":false}')

          echo "Release: $(echo "$RELEASE_JSON" | python3 -c 'import sys,json; r=json.load(sys.stdin); print(r.get("html_url",str(r)))')"

          UPLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c 'import sys,json; r=json.load(sys.stdin); print(r["upload_url"].split("{")[0])')
          echo "Upload URL: $UPLOAD_URL"
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"

          echo "Uploading APK..."
          ASSET_JSON=$(curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK_PATH" \
            "${UPLOAD_URL}?name=6700-transfer-debug.apk")

          echo "Asset URL: $(echo "$ASSET_JSON" | python3 -c 'import sys,json; r=json.load(sys.stdin); print(r.get("browser_download_url",str(r)))')"
          echo "Done!"
